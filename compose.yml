services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: home-dictation-api:dev
    restart: unless-stopped
    working_dir: /app
    environment:
      MODEL_ID: ${MODEL_ID:-FluidInference/parakeet-tdt-0.6b-v3-ov}
      MODEL_REVISION: ${MODEL_REVISION:-dfd55eb6c85a9a8546a162bed84784245d5743c2}
      HF_HOME: ${HF_HOME:-/opt/hf-cache}
      MODEL_ROOT: ${MODEL_ROOT:-/opt/models}
      MODEL_DIR: ${MODEL_DIR:-/opt/models/parakeet-tdt-0.6b-v3-ov}
      OPENVINO_DEVICE: ${OPENVINO_DEVICE:-CPU}
      PRELOAD_MODEL: ${PRELOAD_MODEL:-1}
      TRIM_SILENCE: ${TRIM_SILENCE:-1}
      API_KEY: ${API_KEY:-}
      PUBLIC_MODEL_NAME: ${PUBLIC_MODEL_NAME:-whisper-1}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - hf-cache:/opt/hf-cache
      - model-store:/opt/models
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8080/healthz').status == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

volumes:
  hf-cache:
  model-store:
